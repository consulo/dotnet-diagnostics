name: dbgshim

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            out_dir: linux-x86_64
            elf_machine: Advanced Micro Devices X86-64
            cross: false
          - arch: arm64
            out_dir: linux-aarch64
            elf_machine: AArch64
            codename: noble
            cross: true
          - arch: loongarch64
            out_dir: linux-loongarch64
            elf_machine: LoongArch
            codename: sid
            cross: true
          - arch: riscv64
            out_dir: linux-riscv64
            elf_machine: RISC-V
            codename: noble
            cross: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang make python3 \
            debootstrap qemu-user-static binfmt-support \
            debian-archive-keyring debian-ports-archive-keyring

      - name: Install Loongson toolchain (loongarch64)
        if: matrix.arch == 'loongarch64'
        run: |
          set -euo pipefail
          # 1. Cross toolchain (gcc + binutils + glibc 2.40) — same one consulo/Loader uses.
          URL="https://github.com/loongson/build-tools/releases/download/2024.08.08/x86_64-cross-tools-loongarch64-binutils_2.43-gcc_14.2.0-glibc_2.40.tar.xz"
          wget -q "$URL" -O /tmp/loongson.tar.xz
          sudo mkdir -p /opt/loongson
          sudo tar -xf /tmp/loongson.tar.xz -C /opt/loongson --strip-components=1
          echo "/opt/loongson/bin" >> $GITHUB_PATH

          # 2. Bridge triplet + layout mismatch.
          # Loongson ships "loongarch64-unknown-linux-gnu"; toolchain.cmake
          # expects "loongarch64-linux-gnu" with debian-style layout
          # (<root>/usr/lib/gcc/<triple>/<ver>, <root>/usr/lib/<triple>).
          sudo ln -sfn loongarch64-unknown-linux-gnu /opt/loongson/lib/gcc/loongarch64-linux-gnu
          sudo mkdir -p /opt/loongson/target/usr/lib
          sudo ln -sfn /opt/loongson/lib/gcc /opt/loongson/target/usr/lib/gcc
          sudo ln -sfn /opt/loongson/loongarch64-unknown-linux-gnu/lib /opt/loongson/target/usr/lib/loongarch64-linux-gnu
          sudo mkdir -p /opt/loongson/target/lib
          sudo ln -sfn /opt/loongson/loongarch64-unknown-linux-gnu/lib /opt/loongson/target/lib/loongarch64-linux-gnu

          # 3. Extract debian-ports -dev packages dbgshim's PAL needs
          # (libunwind, libicu). Download raw .deb — bypasses debootstrap's
          # keyring verification entirely, which avoids the debian-ports
          # signing-key rotation issue.
          DPORTS=http://ftp.ports.debian.org/debian-ports/pool/main
          fetch_deb() {
              local url="$1"
              local deb=/tmp/pkg.deb
              wget -q "$url" -O "$deb"
              local tmp=/tmp/deb-extract
              rm -rf "$tmp"; mkdir -p "$tmp"
              (cd "$tmp" && ar x "$deb" && sudo tar -xf data.tar.* -C /opt/loongson/target)
              rm -rf "$tmp" "$deb"
          }
          # Versions tracked against debian-ports sid snapshot. Update as needed.
          fetch_deb "$DPORTS/libu/libunwind/libunwind-dev_1.8.2-2_loong64.deb" || \
              fetch_deb "$DPORTS/libu/libunwind/libunwind-dev_1.8.1-1.1_loong64.deb"
          fetch_deb "$DPORTS/libu/libunwind/libunwind8_1.8.2-2_loong64.deb" || \
              fetch_deb "$DPORTS/libu/libunwind/libunwind8_1.8.1-1.1_loong64.deb"

          echo "ROOTFS_DIR=/opt/loongson/target" >> $GITHUB_ENV

      - name: Build rootfs (debian-based archs)
        if: matrix.cross && matrix.arch != 'loongarch64'
        run: |
          sudo ./eng/common/cross/build-rootfs.sh ${{ matrix.arch }} ${{ matrix.codename }} --skipunmount

      - name: Prune src/CMakeLists to only dbgshim
        run: |
          # We only need libdbgshim.so. Drop SOS and tests:
          #   - SOS's lldbplugin needs lldb-dev which isn't in our sysroots.
          #   - tests require a host runtime and aren't useful for cross builds.
          sed -i '/add_subdirectory(SOS)/d;/add_subdirectory(tests)/d' src/CMakeLists.txt
          echo "=== patched src/CMakeLists.txt ==="
          cat src/CMakeLists.txt

          # dbgshim/CMakeLists.txt directly includes shared.cmake a second time
          # (shared/ already created eventing_headers as a dummy target). Guard
          # the add_custom_target so the second include is a no-op.
          sed -i 's|^    add_custom_target(eventing_headers).*$|    if(NOT TARGET eventing_headers)\n        add_custom_target(eventing_headers)\n    endif()|' src/shared/clrdefinitions.cmake
          echo "=== patched clrdefinitions.cmake (eventing_headers block) ==="
          grep -n -B1 -A5 'eventing_headers' src/shared/clrdefinitions.cmake | head -20

      - name: Build native
        run: |
          CROSS_FLAG=""
          if [ "${{ matrix.cross }}" = "true" ]; then
              CROSS_FLAG="-cross"
          fi
          ./build.sh -a ${{ matrix.arch }} $CROSS_FLAG -configuration Release -skipmanaged -cmakeargs "-DFEATURE_EVENT_TRACE=OFF"

      - name: Locate libdbgshim.so
        run: |
          set -euo pipefail
          echo "=== all libdbgshim.so files ==="
          find artifacts -name libdbgshim.so
          BIN=$(find artifacts -name libdbgshim.so -type f | head -1)
          if [ -z "$BIN" ]; then
              echo "::error::libdbgshim.so not produced"
              exit 1
          fi
          mkdir -p out/${{ matrix.out_dir }}
          cp "$BIN" out/${{ matrix.out_dir }}/libdbgshim.so

      - name: Verify libdbgshim.so
        run: |
          set -euo pipefail
          SO=out/${{ matrix.out_dir }}/libdbgshim.so
          echo "=== File: $SO ==="
          ls -la "$SO"
          echo
          echo "=== ELF header ==="
          readelf -h "$SO" | grep -E "Class|Machine|Type"
          MACHINE=$(readelf -h "$SO" | awk -F: '/Machine:/ {sub(/^[ \t]+/,"",$2); print $2}')
          if [ "$MACHINE" != "${{ matrix.elf_machine }}" ]; then
              echo "::error::ELF machine mismatch. Expected '${{ matrix.elf_machine }}' for ${{ matrix.arch }}, got '$MACHINE'."
              exit 1
          fi
          echo
          echo "=== Dynamic dependencies (NEEDED) ==="
          readelf -d "$SO" | grep -E 'NEEDED|SONAME|RUNPATH'
          echo
          echo "=== Exported dbgshim symbols ==="
          # -W: do not truncate long names. Names may have a @@VERSION suffix
          # (versioned symbols); strip it before matching.
          readelf -W --dyn-syms "$SO" \
            | awk '$7 != "UND" && ($5 == "GLOBAL" || $5 == "WEAK") { sub(/@@?.*/, "", $8); print $8 }' \
            | sort -u > /tmp/exports.txt
          cat /tmp/exports.txt
          echo
          MISSING=0
          for sym in CreateProcessForLaunch CloseCLREnumeration EnumerateCLRs RegisterForRuntimeStartup GetStartupNotificationEvent UnregisterForRuntimeStartup; do
              if ! grep -q "^${sym}\$" /tmp/exports.txt; then
                  echo "::error::export '$sym' missing from $SO"
                  MISSING=1
              fi
          done
          [ "$MISSING" = "0" ] || exit 1
          echo "OK: libdbgshim.so is '$MACHINE' with all expected dbgshim exports."

      - uses: actions/upload-artifact@v4
        with:
          name: libdbgshim-${{ matrix.arch }}
          path: out
          if-no-files-found: error

  publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: binaries-publish
      cancel-in-progress: false
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange binaries by os-arch
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in artifacts/libdbgshim-*/; do
            cp -r "$dir"* out/
          done
          find out -type f

      - name: Commit and push to consulo/binaries
        env:
          CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://consulo-bot:${CONSULO_BOT_TOKEN}@github.com/consulo/binaries.git" binaries-repo
          cd binaries-repo
          git checkout master 2>/dev/null || git checkout --orphan master
          git config user.name "consulo Bot"
          git config user.email "consulo.bot@gmail.com"
          cp -r ../out/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update libdbgshim from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
            git push -u origin master
          fi
